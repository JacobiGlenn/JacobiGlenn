name: Update Guestbook

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  issues:
    types: [opened, edited, deleted, labeled]
  workflow_dispatch:  # This lets you manually trigger it

permissions:
  contents: write
  issues: read

jobs:
  update-guestbook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Update Guestbook from Issues
        uses: techgaun/guestbook-action@v1.0.0
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          issue_label: 'Guestbook Entry'  # Changed from 'guestbook' to match your label
          max_entries: 20
          readme_path: './README.md'
          section_name: 'guestbook'
