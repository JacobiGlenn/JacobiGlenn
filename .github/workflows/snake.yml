name: Generate Snake Animation

on:
  # This schedules the action to run automatically every day at 5:00 UTC
  schedule:
    - cron: "0 5 * * *"
  # This allows you to manually trigger the action from the Actions tab
  workflow_dispatch:
  # This triggers the action whenever you push changes to the main branch
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate GitHub Contribution Snake SVG
        uses: Platane/snk@v3
        with:
          # github user name: use your username
          github_user_name: ${{ github.repository_owner }}
          # Define the output files and their color themes
          outputs: |
            dist/github-snake.svg?palette=github-light
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Push the generated files to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: update snake animation"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}